<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niloufar English Academy</title>

<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#000;color:#fff}
.controls{display:flex;gap:10px}
button,select{padding:8px;border-radius:6px;border:none}
.card{background:#fff;padding:20px;margin:20px;border-radius:10px}
.price{font-size:28px;font-weight:bold}
</style>
</head>

<body>

<header>
<h2>Niloufar English</h2>

<div class="controls">
<button onclick="setLang('tr')">🇹🇷</button>
<button onclick="setLang('en')">🇬🇧</button>
<button onclick="setLang('fa')">🇮🇷</button>

<select onchange="setCurrency(this.value)">
<option value="TRY">₺</option>
<option value="USD">$</option>
<option value="EUR">€</option>
<option value="GBP">£</option>
<option value="TOMAN">تومان</option>
</select>
</div>
</header>

<div class="card">
<h3>Starter</h3>
<div class="price" data-price="2800"></div>
<button onclick="whatsapp('Starter')">Kayıt</button>
</div>

<div class="card">
<h3>Kids</h3>
<div class="price" data-price="4200"></div>
<button onclick="whatsapp('Kids')">Kayıt</button>
</div>

<script>
const telefon = "989010718143";

let currency="TRY";

const rates={
TRY:1,
USD:0.031,
EUR:0.029,
GBP:0.025,
TOMAN:2000
};

function setCurrency(c){
currency=c;
update();
}

function format(p){
let val=p*rates[currency];

if(currency=="TRY") return "₺"+Math.round(val);
if(currency=="USD") return "$"+Math.round(val);
if(currency=="EUR") return "€"+Math.round(val);
if(currency=="GBP") return "£"+Math.round(val);
if(currency=="TOMAN") return Math.round(val)+" تومان";
}

function update(){
document.querySelectorAll("[data-price]").forEach(el=>{
el.innerText=format(el.getAttribute("data-price"));
});
}

function whatsapp(paket){
let msg="Hello, I want info about "+paket;
window.open("https://wa.me/"+telefon+"?text="+encodeURIComponent(msg));
}

update();
</script>

</body>
</html>
