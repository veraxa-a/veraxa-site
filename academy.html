<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Niloufar English Academy</title>

<style>
body{font-family:Arial;background:#f5f5f5;margin:0}
header{display:flex;justify-content:space-between;align-items:center;padding:20px;background:#000;color:#fff}
.logo{font-size:22px;font-weight:bold}
.controls{display:flex;gap:10px}
button,select{padding:8px;border-radius:6px;border:none}
.hero{padding:60px;text-align:center}
.price{font-size:28px;font-weight:bold;margin:10px 0}
.card{background:#fff;padding:20px;margin:20px;border-radius:10px}
</style>
</head>

<body>

<header>
<div class="logo">Niloufar English</div>

<div class="controls">
<button onclick="setLang('tr')">🇹🇷</button>
<button onclick="setLang('en')">🇬🇧</button>
<button onclick="setLang('fa')">🇮🇷</button>

<select onchange="setCurrency(this.value)">
<option value="TRY">₺</option>
<option value="USD">$</option>
<option value="EUR">€</option>
<option value="GBP">£</option>
<option value="TOMAN">تومان</option>
</select>
</div>
</header>

<div class="hero">
<h1 id="title">İngilizce öğren</h1>
<p id="desc">Premium ders sistemi</p>
</div>

<div class="card">
<h3>Starter</h3>
<div class="price" data-price="2800"></div>
</div>

<div class="card">
<h3>Kids</h3>
<div class="price" data-price="4200"></div>
</div>

<script>
let currentLang="tr";
let currentCurrency="TRY";

const rates={
TRY:1,
USD:0.031,
EUR:0.029,
GBP:0.025,
TOMAN:2000
};

const texts={
tr:{title:"İngilizce öğren",desc:"Premium ders sistemi"},
en:{title:"Learn English",desc:"Premium lesson system"},
fa:{title:"یادگیری انگلیسی",desc:"سیستم آموزشی حرفه‌ای"}
};

function setLang(lang){
currentLang=lang;
document.getElementById("title").innerText=texts[lang].title;
document.getElementById("desc").innerText=texts[lang].desc;

if(lang==="fa"){
document.body.style.direction="rtl";
}else{
document.body.style.direction="ltr";
}
}

function setCurrency(cur){
currentCurrency=cur;
updatePrices();
}

function formatPrice(price){
let value=price*rates[currentCurrency];

if(currentCurrency==="TRY") return "₺"+Math.round(value);
if(currentCurrency==="USD") return "$"+Math.round(value);
if(currentCurrency==="EUR") return "€"+Math.round(value);
if(currentCurrency==="GBP") return "£"+Math.round(value);
if(currentCurrency==="TOMAN") return Math.round(value)+" تومان";
}

function updatePrices(){
document.querySelectorAll("[data-price]").forEach(el=>{
let p=parseFloat(el.getAttribute("data-price"));
el.innerText=formatPrice(p);
});
}

updatePrices();
</script>

</body>
</html>
