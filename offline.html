<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VÉRAXA | Offline</title>

  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{
      min-height:100vh;
      display:grid;
      place-items:center;
      background:#030303;
      color:#f8f2e8;
      font-family:Arial,sans-serif;
      padding:24px;
      text-align:center;
    }
    .box{
      max-width:560px;
      border:1px solid rgba(214,179,106,.32);
      padding:42px 28px;
      background:#080808;
    }
    h1{
      font-family:Georgia,serif;
      font-size:42px;
      font-weight:300;
      letter-spacing:8px;
      margin-bottom:16px;
    }
    p{
      color:#aaa29a;
      line-height:1.8;
      margin-bottom:22px;
    }
    a{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-height:46px;
      padding:0 24px;
      border-radius:999px;
      background:#f8f2e8;
      color:#080808;
      text-decoration:none;
      letter-spacing:2px;
      font-size:12px;
      text-transform:uppercase;
      font-weight:bold;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>VÉRAXA</h1>

    <p>
      Şu an bağlantı yok gibi görünüyor. İnternet bağlantını kontrol edip
      tekrar deneyebilirsin.
    </p>

    <a href="/">Ana Sayfaya Dön</a>
  </div>
</body>
</html>
