<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÉRAXA | Luxury Women Clothing</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{background:#050505;color:#f5ead8;font-family:Georgia,serif}

header{
position:fixed;top:0;width:100%;z-index:99;
background:rgba(0,0,0,.88);backdrop-filter:blur(16px);
padding:18px 7%;display:flex;justify-content:space-between;align-items:center;
border-bottom:1px solid rgba(214,179,106,.25)
}

.logo{font-size:38px;letter-spacing:9px;color:#d6b36a;text-shadow:0 0 20px rgba(214,179,106,.45)}
nav a{color:#f5ead8;text-decoration:none;margin-left:22px;font-size:12px;letter-spacing:2px}

.hero{
min-height:90vh;
background:linear-gradient(rgba(0,0,0,.35),rgba(0,0,0,.92)),
url("https://www.kaktusmoda.com/i/l/014/0146501_terikoton-kumas-kemerli-elbise-siyah.jpeg");
background-size:cover;background-position:center;
display:flex;align-items:center;justify-content:center;text-align:center;padding:120px 20px
}

.hero h1{font-size:78px;letter-spacing:12px}
.hero p{color:#d6b36a;letter-spacing:4px;margin-top:12px}

section{padding:80px 7%}
.title{text-align:center;font-size:38px;letter-spacing:6px;font-weight:400;margin-bottom:12px}
.sub{text-align:center;color:#aa9b83;letter-spacing:3px;margin-bottom:45px}

.products{display:grid;grid-template-columns:repeat(3,1fr);gap:26px}
.card{background:#0b0b0b;border:1px solid rgba(214,179,106,.28);overflow:hidden;transition:.35s}
.card:hover{transform:translateY(-8px);border-color:#d6b36a;box-shadow:0 20px 55px rgba(0,0,0,.75)}
.card img{width:100%;height:430px;object-fit:cover;background:#111}
.info{padding:22px;text-align:center}
.info h3{font-size:16px;letter-spacing:2px;font-weight:400;min-height:45px}
.info p{color:#aa9b83;margin:8px 0;font-size:13px}

select{
width:100%;margin-top:10px;padding:12px;
background:#050505;color:#f5ead8;border:1px solid rgba(214,179,106,.55)
}

.size-table{
font-size:12px;color:#b8aa92;line-height:1.7;margin-top:12px;
border-top:1px solid rgba(214,179,106,.18);padding-top:10px
}

.btn{
display:block;margin-top:13px;padding:13px;
border:1px solid #d6b36a;color:#d6b36a;text-decoration:none;
background:transparent;letter-spacing:2px;cursor:pointer
}

.btn:hover{background:#d6b36a;color:#000}

footer{text-align:center;padding:30px;color:#8d806b;border-top:1px solid rgba(214,179,106,.2);letter-spacing:2px;font-size:12px}

@media(max-width:900px){
header{flex-direction:column;gap:14px}
nav a{margin:0 7px}
.hero h1{font-size:48px}
.products{grid-template-columns:1fr}
.card img{height:450px}
}
</style>
</head>

<body>

<header>
  <div class="logo">VÉRAXA</div>
  <nav>
    <a href="#home">ANA SAYFA</a>
    <a href="#products">ÜRÜNLER</a>
    <a href="#contact">İLETİŞİM</a>
  </nav>
</header>

<section class="hero" id="home">
  <div>
    <h1>VÉRAXA</h1>
    <p>LUXURY WOMEN CLOTHING</p>
  </div>
</section>

<section id="products">
  <h2 class="title">VÉRAXA COLLECTION</h2>
  <p class="sub">9 PREMIUM PRODUCT</p>
  <div class="products" id="productList"></div>
</section>

<section id="contact">
  <h2 class="title">CONTACT</h2>
  <p class="sub">Sipariş için WhatsApp veya Telegram</p>
</section>

<footer>© 2026 VÉRAXA • VERAXA.CO</footer>

<script>
const products = [
{
name:"Terikoton Kumaş Kemerli Elbise - Siyah",
category:"Luxury Dress",
image:"https://www.kaktusmoda.com/i/l/014/0146501_terikoton-kumas-kemerli-elbise-siyah.jpeg",
colors:["Siyah"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş U Yaka Bluz - Ekru",
category:"Premium Bluz",
image:"https://www.kaktusmoda.com/i/l/014/0146210_cilek-viskon-kumas-u-yaka-bluz-ekru.jpeg",
colors:["Ekru"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş V Yaka Basic Tişört - Bej",
category:"Basic Luxury",
image:"https://www.kaktusmoda.com/i/l/014/0146207_cilek-viskon-kumas-v-yaka-basic-tisort-bej.jpeg",
colors:["Bej"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş U Yaka Bluz - Bej",
category:"Premium Bluz",
image:"https://www.kaktusmoda.com/i/l/014/0146208_cilek-viskon-kumas-u-yaka-bluz-bej.jpeg",
colors:["Bej"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş U Yaka Bluz - Gri",
category:"Premium Bluz",
image:"https://www.kaktusmoda.com/i/l/014/0146205_cilek-viskon-kumas-u-yaka-bluz-gri.jpeg",
colors:["Gri"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş U Yaka Bluz - Haki",
category:"Premium Bluz",
image:"https://www.kaktusmoda.com/i/l/014/0146203_cilek-viskon-kumas-u-yaka-bluz-haki.jpeg",
colors:["Haki"],
sizes:["S","M","L"]
},
{
name:"Çilek Viskon Kumaş U Yaka Bluz - Bordo",
category:"Premium Bluz",
image:"https://www.kaktusmoda.com/i/l/014/0146201_cilek-viskon-kumas-u-yaka-bluz-bordo.jpeg",
colors:["Bordo"],
sizes:["S","M","L"]
},
{
name:"Modal Kumaş Duble Paça Kadın Pantolon - Bej",
category:"Luxury Pantolon",
image:"https://www.kaktusmoda.com/i/l/014/0146101_modal-kumas-duble-paca-kadin-pantolon-bej.jpeg",
colors:["Bej"],
sizes:["S","M","L","XL"]
},
{
name:"Süprem Kumaş Çizgili Tişört - Mavi",
category:"Premium Tişört",
image:"https://www.kaktusmoda.com/i/l/014/0146001_suprem-kumas-cizgili-tisort-mavi.jpeg",
colors:["Mavi"],
sizes:["S","M","L"]
}
];

const container = document.getElementById("productList");

products.forEach((p,i)=>{
let colorOptions = p.colors.map(c=>`<option value="${c}">${c}</option>`).join("");
let sizeOptions = p.sizes.map(s=>`<option value="${s}">${s}</option>`).join("");

container.innerHTML += `
<div class="card">
<img src="${p.image}" alt="${p.name}" onerror="this.src='https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=900&q=90'">
<div class="info">
<h3>${p.name}</h3>
<p>${p.category}</p>

<select id="color-${i}">
${colorOptions}
</select>

<select id="size-${i}">
${sizeOptions}
</select>

<div class="size-table">
Beden Tablosu:<br>
S: 36-38<br>
M: 38-40<br>
L: 40-42<br>
XL: 42-44
</div>

<button class="btn" onclick="orderProduct('${p.name}', ${i})">SİPARİŞ VER</button>
</div>
</div>
`;
});

function orderProduct(name,index){
let color = document.getElementById("color-"+index).value;
let size = document.getElementById("size-"+index).value;

let message =
`Merhaba, VÉRAXA sitesinden sipariş vermek istiyorum.%0A%0AÜrün: ${name}%0ARenk: ${color}%0ABeden: ${size}`;

window.open(`https://wa.me/989010718143?text=${message}`, "_blank");
}
</script>

</body>
</html>
