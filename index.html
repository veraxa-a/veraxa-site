<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta name="description" content="VÉRAXA luxury streetwear, kadın koleksiyonu, erkek/unisex parçalar ve custom DTF baskı stüdyosu." />
  <meta name="theme-color" content="#030303" />

  <title>VÉRAXA | Luxury Streetwear & Custom DTF Studio</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="assets/css/style.css?v=300" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>

<body>
  <div id="loader">
    <div class="loader-logo">VÉRAXA</div>
  </div>

  <div id="productModal" class="product-modal" aria-hidden="true">
    <div class="modal-box">
      <button class="modal-close" type="button" onclick="closeProductModal()" aria-label="Kapat">×</button>

      <div id="modalGallery" class="modal-gallery"></div>

      <div class="modal-info">
        <span id="modalCategory"></span>
        <h2 id="modalName"></h2>
        <p id="modalPrice" class="modal-price"></p>
        <p id="modalDesc"></p>

        <select id="modalSize">
          <option value="">Beden Seç</option>
          <option>S</option>
          <option>M</option>
          <option>L</option>
          <option>XL</option>
        </select>

        <button id="modalWhatsapp" type="button">WhatsApp ile Sipariş</button>
      </div>
    </div>
  </div>

  <aside id="cartDrawer" class="cart-drawer" aria-hidden="true">
    <button class="cart-close" type="button" onclick="closeCart()">×</button>

    <h2>Sepet</h2>

    <div id="cartItems" class="cart-items"></div>

    <button class="cart-whatsapp" type="button" onclick="sendCartWhatsApp()">WhatsApp ile Sipariş Ver</button>
  </aside>

  <header class="header">
    <a href="#" class="logo">VÉRAXA</a>

    <nav class="nav">
      <a href="#">Ana Sayfa</a>
      <a href="#collections">Koleksiyon</a>
      <a href="#products">Ürünler</a>
      <a href="#dtf">DTF Studio</a>
      <a href="legal/return-policy.html">İade</a>
    </nav>

    <div class="nav-right">
      <button type="button" onclick="toggleWishlist()">Favori <span id="wishlistCount">0</span></button>
      <button type="button" onclick="openCart()">Sepet <span id="cartCount">0</span></button>
      <a href="https://wa.me/905468853731" target="_blank">WhatsApp</a>
    </div>
  </header>

  <main>
    <section class="hero">
      <img src="assets/images/hero/hero-main.jpg" alt="VÉRAXA Luxury Fashion" />

      <div class="hero-content">
        <span class="eyebrow">Premium Streetwear</span>

        <h1>Luxury<br />Redefined</h1>

        <p>
          Modern kesim, seçili koleksiyonlar ve özel DTF baskı hizmeti.
          VÉRAXA, günlük giyimi luxury bir duruşla yeniden yorumlar.
        </p>

        <div class="hero-actions">
          <a class="btn light" href="#products">Koleksiyonu Keşfet</a>
          <a class="btn dark" href="#dtf">DTF Studio</a>
        </div>
      </div>
    </section>

    <section class="section" id="collections">
