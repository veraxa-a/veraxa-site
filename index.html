<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÉRAXA | Luxury Clothing & Custom DTF</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--black:#020202;--soft:#080808;--card:#101010;--gold:#d6b36a;--gold2:#f5deb3;--text:#f8f3e8;--muted:#aaa29a}
html{scroll-behavior:smooth}
body{font-family:Arial,Helvetica,sans-serif;background:var(--black);color:var(--text)}
a{text-decoration:none;color:inherit}
button,input,select{font-family:inherit}
button:disabled{opacity:.5;cursor:not-allowed}

.topbar{background:linear-gradient(90deg,#8a6428,#f5deb3,#8a6428);color:#050505;padding:10px;overflow:hidden;white-space:nowrap;font-size:13px;font-weight:bold;letter-spacing:1px}
.topbar span{display:inline-block;padding-left:100%;animation:marquee 23s linear infinite}
@keyframes marquee{100%{transform:translateX(-100%)}}

header{position:fixed;top:0;left:0;width:100%;z-index:99;background:linear-gradient(rgba(0,0,0,.92),rgba(0,0,0,.18));backdrop-filter:blur(16px)}
.nav{max-width:1320px;margin:auto;display:flex;justify-content:space-between;align-items:center;padding:18px 22px}
.logo{font-family:Georgia,serif;font-size:30px;letter-spacing:9px;font-weight:300;cursor:pointer}
.logo span{color:var(--gold2)}
.menu{display:flex;gap:23px;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.menu a:hover{color:var(--gold2)}
.navRight{display:flex;gap:10px;align-items:center}
.navBtn,.authMiniBtn{background:rgba(0,0,0,.35);color:var(--text);border:1px solid rgba(214,179,106,.5);padding:9px 14px;border-radius:30px;cursor:pointer;font-size:12px}
.navBtn:hover,.authMiniBtn:hover{background:var(--gold);color:#111}

#userArea{display:none;align-items:center}
.accountBox{display:flex;align-items:center;gap:9px;border:1px solid rgba(214,179,106,.55);background:rgba(0,0,0,.42);padding:6px 8px;border-radius:40px}
.accountBox img{width:30px;height:30px;border-radius:50%;object-fit:cover;background:#fff}
.accountBox div{display:flex;flex-direction:column;line-height:1.1}
.accountBox strong{font-size:12px;color:var(--text);max-width:95px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.accountBox small{font-size:10px;color:var(--gold2)}
.accountBox button{border:none;background:var(--gold);color:#111;padding:7px 10px;border-radius:30px;cursor:pointer;font-size:11px;font-weight:bold}

.hero{min-height:100vh;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;text-align:center;color:white}
.hero::before{content:"";position:absolute;inset:0;background:linear-gradient(90deg,rgba(0,0,0,.94),rgba(0,0,0,.32),rgba(0,0,0,.94)),linear-gradient(rgba(0,0,0,.08),rgba(0,0,0,.95)),url("https://images.pexels.com/photos/1926769/pexels-photo-1926769.jpeg?auto=compress&cs=tinysrgb&w=1800");background-size:cover;background-position:center;transform:scale(1.05);animation:heroZoom 12s ease-in-out infinite alternate;filter:contrast(1.1) brightness(.86)}
@keyframes heroZoom{from{transform:scale(1.05)}to{transform:scale(1.13)}}
.heroContent{position:relative;z-index:2;padding:20px}
.heroTag{display:inline-block;border:1px solid rgba(214,179,106,.72);padding:9px 24px;border-radius:40px;color:var(--gold2);font-size:12px;letter-spacing:3px;margin-bottom:22px;background:rgba(0,0,0,.32)}
.hero h1{font-family:Georgia,serif;font-size:108px;letter-spacing:18px;font-weight:300;margin-bottom:16px;text-shadow:0 30px 90px rgba(0,0,0,.95)}
.hero h1 span{color:var(--gold2)}
.hero p{max-width:760px;margin:0 auto 20px;color:#e8e0d4;font-size:18px;letter-spacing:3px;line-height:1.8}
.heroTrust{margin-top:12px;color:#c9a45c;font-size:13px;letter-spacing:2px}
.heroBtns{display:flex;justify-content:center;gap:14px;flex-wrap:wrap;margin-top:25px}
.btn{background:linear-gradient(90deg,#b58a3e,#f5deb3,#b58a3e);color:#080808;border:none;padding:15px 38px;border-radius:40px;font-weight:bold;cursor:pointer;letter-spacing:1px}
.btn.dark{background:rgba(0,0,0,.42);color:white;border:1px solid rgba(214,179,106,.75)}
.heroBottom{position:absolute;bottom:0;left:0;right:0;z-index:3;display:grid;grid-template-columns:repeat(3,1fr);border-top:1px solid rgba(214,179,106,.35);background:rgba(0,0,0,.52);backdrop-filter:blur(12px)}
.heroBottom div{padding:18px 10px;border-right:1px solid rgba(214,179,106,.25);font-size:12px;letter-spacing:2px;color:#ddd}
.heroBottom b{color:var(--gold2)}

.section{max-width:1320px;margin:auto;padding:92px 22px}
.title{text-align:center;margin-bottom:44px}
.title small{color:var(--gold);letter-spacing:4px;font-size:12px}
.title h2{font-family:Georgia,serif;font-size:46px;font-weight:300;letter-spacing:5px;margin-top:12px}
.title p{color:var(--muted);margin-top:12px;line-height:1.7}

.collections{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}
.colCard{height:330px;position:relative;border-radius:28px;overflow:hidden;cursor:pointer;border:1px solid rgba(214,179,106,.25);background:var(--card)}
.colCard img{width:100%;height:100%;object-fit:cover;transition:.5s;opacity:.86}
.colCard:hover img{transform:scale(1.08);opacity:1}
.colCard div{position:absolute;inset:auto 0 0 0;padding:24px;background:linear-gradient(transparent,rgba(0,0,0,.92))}
.colCard h3{font-family:Georgia,serif;font-weight:300;letter-spacing:3px;font-size:24px}
.colCard p{color:#bbb;margin-top:8px;font-size:13px}

.searchBox{max-width:500px;margin:0 auto 25px}
.searchBox input{width:100%;background:var(--soft);border:1px solid rgba(214,179,106,.35);color:var(--text);padding:15px 20px;border-radius:40px;outline:none}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:12px;margin-bottom:40px}
.filters button{background:transparent;color:var(--text);border:1px solid rgba(214,179,106,.4);padding:11px 22px;border-radius:40px;cursor:pointer}
.filters button.active,.filters button:hover{background:var(--gold);color:#111}

.products,.printGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:30px}
.card,.printCard{background:linear-gradient(180deg,#111,#070707);border:1px solid rgba(214,179,106,.18);border-radius:28px;overflow:hidden;position:relative;transition:.35s}
.card:hover,.printCard:hover{transform:translateY(-8px);border-color:rgba(214,179,106,.75);box-shadow:0 25px 70px rgba(0,0,0,.55)}
.badge,.stock{position:absolute;top:15px;z-index:3;padding:7px 13px;border-radius:30px;font-size:11px}
.badge{left:15px;background:linear-gradient(90deg,#b58a3e,#f5deb3);color:#111;font-weight:bold}
.stock{right:15px;background:rgba(0,0,0,.62);border:1px solid rgba(214,179,106,.5)}
.fav{position:absolute;top:56px;right:15px;z-index:4;width:36px;height:36px;border-radius:50%;border:1px solid rgba(214,179,106,.6);background:rgba(0,0,0,.7);color:white;cursor:pointer}
.fav.active{background:var(--gold);color:#111}
.card img,.printCard img{width:100%;height:430px;object-fit:cover;display:block;cursor:pointer}
.info,.printInfo{padding:22px}
.info h3,.printInfo h3{font-family:Georgia,serif;font-size:21px;font-weight:300;margin-bottom:9px;cursor:pointer}
.price{color:var(--gold2);font-size:20px;margin-bottom:10px}
.miniText,.printInfo p{color:var(--muted);font-size:13px;margin-bottom:14px;line-height:1.7}
.selects{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px}
select{background:#060606;color:var(--text);border:1px solid rgba(214,179,106,.35);padding:11px;border-radius:12px}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.add,.quick,.printBtn{border:none;padding:13px;border-radius:16px;font-weight:bold;cursor:pointer}
.add,.printBtn{background:var(--text);color:#111}
.quick{background:#25D366;color:white}

.luxBanner{max-width:1320px;margin:0 auto;padding:0 22px 76px}
.bannerGrid{display:grid;grid-template-columns:1.25fr .75fr;gap:24px}
.bigBanner,.smallBanner{position:relative;border-radius:34px;overflow:hidden;min-height:540px;border:1px solid rgba(214,179,106,.25)}
.bigBanner img,.smallBanner img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
.bannerOverlay{position:absolute;inset:0;background:linear-gradient(transparent,rgba(0,0,0,.94))}
.bannerText{position:absolute;left:34px;right:34px;bottom:34px;z-index:2}
.bannerText small{color:var(--gold2);letter-spacing:3px}
.bannerText h2{font-family:Georgia,serif;font-size:46px;font-weight:300;margin:12px 0}
.bannerText p{color:#ddd;line-height:1.75;max-width:580px}

.printHero{position:relative;overflow:hidden;border-radius:34px;border:1px solid rgba(214,179,106,.25);min-height:430px;margin-bottom:34px;background:linear-gradient(90deg,rgba(0,0,0,.92),rgba(0,0,0,.36)),url("https://images.pexels.com/photos/8532616/pexels-photo-8532616.jpeg?auto=compress&cs=tinysrgb&w=1600");background-size:cover;background-position:center;display:flex;align-items:end;padding:38px}
.printHero h2{font-family:Georgia,serif;font-size:48px;font-weight:300;letter-spacing:4px}
.printHero p{max-width:680px;color:#ddd;line-height:1.8;margin-top:12px}
.printSteps{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-top:28px}
.printSteps div{background:#0d0d0d;border:1px solid rgba(214,179,106,.18);border-radius:22px;padding:22px;text-align:center;color:#ccc;line-height:1.7}
.printSteps b{color:var(--gold2)}

.finder{max-width:760px;margin:auto;background:linear-gradient(180deg,#111,#070707);border:1px solid rgba(214,179,106,.25);border-radius:30px;padding:32px}
.finderGrid{display:grid;grid-template-columns:1fr 1fr auto;gap:12px}
.finder input{padding:15px;border-radius:16px;border:1px solid rgba(214,179,106,.35);background:#060606;color:white}
.result{color:var(--gold2);font-size:20px;text-align:center;margin-top:18px}

.trust{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:45px}
.trust div{background:var(--card);border:1px solid rgba(214,179,106,.18);border-radius:24px;padding:26px;text-align:center;color:#ccc;line-height:1.7}

.faq{max-width:900px;margin:auto}
.faqItem{background:var(--card);border:1px solid rgba(214,179,106,.18);border-radius:20px;margin-bottom:12px;overflow:hidden}
.faqQ{padding:20px;cursor:pointer;color:var(--gold2)}
.faqA{display:none;padding:0 20px 20px;color:var(--muted);line-height:1.7}
.faqItem.open .faqA{display:block}

.brand{background:linear-gradient(rgba(0,0,0,.74),rgba(0,0,0,.94)),url("https://images.pexels.com/photos/7679651/pexels-photo-7679651.jpeg?auto=compress&cs=tinysrgb&w=1600");background-size:cover;background-position:center;text-align:center;padding:110px 22px;border-top:1px solid rgba(214,179,106,.25);border-bottom:1px solid rgba(214,179,106,.25)}
.brand h2{font-family:Georgia,serif;font-size:44px;letter-spacing:5px;font-weight:300}
.brand p{max-width:760px;margin:18px auto 0;color:#ddd;line-height:1.9}

footer{text-align:center;color:var(--muted);padding:45px 20px 90px}
.contact{display:flex;justify-content:center;gap:12px;flex-wrap:wrap;margin-top:20px}
.contact a{border:1px solid rgba(214,179,106,.45);border-radius:40px;padding:12px 20px}

.cartPanel{position:fixed;top:0;right:-430px;width:390px;max-width:92%;height:100vh;background:#070707;border-left:1px solid var(--gold);z-index:1001;padding:26px;transition:.35s;overflow:auto}
.cartPanel.open{right:0}
.close{float:right;font-size:26px;cursor:pointer;color:var(--gold2)}
.cartItem{border-bottom:1px solid rgba(214,179,106,.22);padding:15px 0;font-size:14px}
.whatsapp{width:100%;margin-top:20px;padding:15px;border:none;border-radius:16px;background:#25D366;color:white;font-weight:bold;cursor:pointer}

.modal,.authModal{display:none;position:fixed;inset:0;z-index:1002;background:rgba(0,0,0,.84);align-items:center;justify-content:center;padding:18px}
.modal.open,.authModal.open{display:flex}
.modalBox{max-width:960px;width:100%;background:#070707;border:1px solid var(--gold);border-radius:30px;overflow:hidden;display:grid;grid-template-columns:1fr 1fr;position:relative}
.modalBox img{width:100%;height:100%;min-height:560px;object-fit:cover}
.modalContent{padding:34px}
.modalContent h2{font-family:Georgia,serif;font-size:32px;font-weight:300;margin-bottom:12px}
.modalContent p{color:#c8c0b7;line-height:1.8;margin-bottom:12px}
.modalClose,.authClose{position:absolute;top:14px;right:22px;font-size:30px;cursor:pointer;color:var(--gold2);z-index:4}
.sizeTable{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px}
.sizeTable td,.sizeTable th{border:1px solid rgba(214,179,106,.25);padding:10px;text-align:center}
.sizeTable th{color:var(--gold2)}

.authBoxPanel{position:relative;max-width:430px;width:100%;background:#070707;border:1px solid var(--gold);border-radius:30px;padding:34px;box-shadow:0 30px 90px rgba(0,0,0,.65)}
.authBoxPanel h2{font-family:Georgia,serif;font-weight:300;letter-spacing:3px;margin-bottom:10px}
.authBoxPanel p{color:#aaa;margin-bottom:18px;line-height:1.6}
.authBoxPanel input{width:100%;background:#050505;border:1px solid rgba(214,179,106,.35);border-radius:16px;color:white;padding:14px;margin-bottom:10px}
.authFullBtn{width:100%;border:none;border-radius:16px;padding:14px;margin-top:8px;background:linear-gradient(90deg,#b58a3e,#f5deb3,#b58a3e);color:#111;font-weight:bold;cursor:pointer}
.authGhostBtn{width:100%;border:1px solid rgba(214,179,106,.55);border-radius:16px;padding:13px;margin-top:10px;background:transparent;color:white;cursor:pointer}
.authSwitch{margin-top:14px;text-align:center;color:#aaa;font-size:13px}
.authSwitch span{color:var(--gold2);cursor:pointer}

.bottomBar{display:none;position:fixed;left:0;right:0;bottom:0;z-index:1000;grid-template-columns:repeat(3,1fr);background:#070707;border-top:1px solid rgba(214,179,106,.45)}
.bottomBar a,.bottomBar button{background:transparent;color:white;border:none;padding:14px 6px;font-size:12px}

@media(max-width:900px){
.menu{display:none}.hero h1{font-size:50px;letter-spacing:9px}.hero p{font-size:14px}.heroBottom{grid-template-columns:1fr}
.bannerGrid{grid-template-columns:1fr}.bigBanner,.smallBanner{min-height:430px}
.collections{grid-template-columns:1fr 1fr}.products,.printGrid{grid-template-columns:1fr}.printSteps{grid-template-columns:1fr 1fr}
.trust{grid-template-columns:1fr 1fr}.finderGrid{grid-template-columns:1fr}.modalBox{grid-template-columns:1fr;max-height:92vh;overflow:auto}.modalBox img{min-height:auto;height:390px}.bottomBar{display:grid}
}
@media(max-width:520px){
.logo{font-size:21px;letter-spacing:5px}.nav{padding:14px}.navBtn,.authMiniBtn{font-size:11px;padding:8px 10px}
.hero h1{font-size:39px;letter-spacing:7px}.heroTag{font-size:10px}.title h2{font-size:31px}
.collections,.trust,.printSteps{grid-template-columns:1fr}.card img,.printCard img{height:410px}.actions{grid-template-columns:1fr}.bannerText h2,.printHero h2{font-size:32px}
}
</style>
</head>

<body>

<div class="topbar">
<span>NEW SEASON DROP • PREMIUM QUALITY • ÖZEL DTF BASKI • WHATSAPP İLE HIZLI SİPARİŞ • LIMITED COLLECTION • VÉRAXA.CO •</span>

<div class="nav">

<nav class="menu">

</div>
