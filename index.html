<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VÉRAXA | Ultra Luxury</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--black:#030303;
--soft:#090909;
--card:#101010;
--gold:#d6b36a;
--gold2:#f5deb3;
--text:#f8f3e8;
--muted:#aaa29a;
}

body{
font-family:Arial;
background:var(--black);
color:var(--text);
}

header{
position:fixed;
width:100%;
top:0;
background:rgba(0,0,0,.7);
backdrop-filter:blur(10px);
z-index:99;
}

.nav{
display:flex;
justify-content:space-between;
padding:20px;
}

.logo{
font-size:28px;
letter-spacing:6px;
cursor:pointer;
}

.hero{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(90deg,rgba(0,0,0,.9),rgba(0,0,0,.4),rgba(0,0,0,.9)),
url("https://images.pexels.com/photos/1926769/pexels-photo-1926769.jpeg?auto=compress&cs=tinysrgb&w=1800");
background-size:cover;
background-position:center;
filter:brightness(.8);
}

.heroContent{
position:relative;
z-index:2;
}

.hero h1{
font-size:110px;
letter-spacing:18px;
}

.hero p{
margin-top:10px;
color:#ddd;
}

.btn{
margin-top:20px;
padding:14px 40px;
background:linear-gradient(90deg,#b58a3e,#f4d994,#b58a3e);
border:none;
border-radius:40px;
cursor:pointer;
}

.section{
padding:100px 20px;
max-width:1200px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:20px;
}

.card{
background:#111;
padding:20px;
border-radius:20px;
}

.card img{
width:100%;
border-radius:15px;
}

.price{
color:var(--gold2);
margin-top:10px;
}

footer{
text-align:center;
padding:40px;
color:#777;
}
</style>
</head>

<body>

<header>
<div class="nav">
<div class="logo">VÉRAXA</div>
</div>
</header>

<section class="hero">
<div class="heroContent">
<h1>VÉRAXA</h1>
<p>Premium Clothing • Limited Collection</p>

<p style="margin-top:10px;color:#c9a45c;font-size:13px;">
LIMITED STOCK • PREMIUM COLLECTION • WHATSAPP ORDER
</p>

<button class="btn">SHOP NOW</button>
</div>
</section>

<section class="section">
<h2 style="text-align:center;margin-bottom:40px;">NEW COLLECTION</h2>

<div class="products">

<div class="card">
<img src="https://images.pexels.com/photos/6311392/pexels-photo-6311392.jpeg">
<h3>Oversize Tee</h3>
<div class="price">899₺</div>
</div>

<div class="card">
<img src="https://images.pexels.com/photos/7679863/pexels-photo-7679863.jpeg">
<h3>Women Tee</h3>
<div class="price">849₺</div>
</div>

<div class="card">
<img src="https://images.pexels.com/photos/6311397/pexels-photo-6311397.jpeg">
<h3>Sweatshirt</h3>
<div class="price">1499₺</div>
</div>

</div>
</section>

<footer>
VÉRAXA • Luxury Clothing
</footer>

</body>
</html>
