*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:#030303;color:#f6efe3;font-family:Inter,Arial,sans-serif}
a{text-decoration:none;color:inherit}

.nav a:hover,.nav-right a:hover{color:#d6b36a}

.hero-content{position:relative;z-index:2;max-width:760px}
.tag,.section-title span,.banner-content span{color:#d6b36a;letter-spacing:4px;font-size:12px;text-transform:uppercase}

.hero p{max-width:560px;color:#d8d0c3;line-height:1.8}
.hero-buttons{display:flex;gap:14px;margin-top:30px;flex-wrap:wrap}
.light-btn,.dark-btn,.banner-content a{display:inline-flex;border-radius:999px;padding:14px 26px;font-size:12px;letter-spacing:2px;text-transform:uppercase}
.light-btn,.banner-content a{background:#f6efe3;color:#080808}.dark-btn{border:1px solid rgba(214,179,106,.55);color:#f6efe3}

.collections,.products,.banner,.footer{padding:90px 6vw}
.section-title{text-align:center;margin-bottom:42px}
.section-title h2{font-family:"Cormorant Garamond",serif;font-size:50px;font-weight:300;letter-spacing:7px;margin-top:10px}
.section-title p{color:#aaa;margin-top:10px}
.collection-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:22px}
.card{position:relative;height:430px;overflow:hidden;display:block;background:#111}
.card img{width:100%;height:100%;object-fit:cover;transition:.5s}
